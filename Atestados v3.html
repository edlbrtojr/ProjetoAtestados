<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Cadastro</title>
    <style>
        body{

            background: linear-gradient(to right, rgb(20, 220, 93), rgb(17,54,71));

        }
        form{
            background: linear-gradient(to right, rgb(16, 189, 134), rgb(17,54,71));
            border-radius: 8px;
            padding: 8px;
            position: absolute;
    
        
        }  

        
    </style>
</head>

<body>
    
    <div class="w-screen h-screen flex justify-center items-center
    bg-gradient-to-br ">
        <form class="p-10 bg-white rounded-xl drop-shadow-lg space-y-5" 
        action="https://api.sheetmonkey.io/form/t5G32DPYddanXYzN5JVX7h" method="post">
            
            <h1 class="text-center text-3xl text-white">JUSTIFICATIVAS DE FALTA</h1>
            <div class="flex flex-col space-y-2">
                <label class="text-sm font-light text-white" for="aluno">Aluno</label>
                <input class="w-96 px-0 py-0 rounded-md border border-slate-400" type="name" placeholder="Digite o nome do aluno"
                    name="Nome do Aluno" id="nomeAluno" required>
            </div>
            <div class="flex flex-col space-y-2">
                <label class="text-sm font-light text-white" for="anoAluno">Ano</label>
                <select class="w-96 px-0 py-0 rounded-md border border-slate-400"  name="Ano " id="anoAluno">
                    <option value = "6">6º ano</option>
                    <option value = "7">7º ano</option>
                    <option value = "8">8º ano</option>
                    <option value = "9">9º ano</option>

                    </select>
            </div>
            <div class="flex flex-col space-y-2">
                <label class="text-sm font-light text-white" for="turmaAluno">Turma</label>
                <select class="w-96 px-0 py-0 rounded-md border border-slate-400"  name="Turma" id="turmaAluno">
                    <option value = "A">A</option>
                    <option value = "B">B</option>
                    <option value = "C">C</option>
                    <option value = "D">D</option>
                    <option value = "E">E</option>
                    <option value = "F">F</option>
                    <option value = "APC">Aprender é o Caminho</option>
                </select>

            </div>
            <div class="flex flex-col space-y-2">
                <label class="text-sm font-light text-white" for="dataAtestado">Data do atestado</label>
                <input class="w-96 px-0 py-0 rounded-md border border-slate-400" type="date" placeholder="Quando o atestado foi emitido?"
                    name="Data do Atestado" id="dataAtestado" required>
            </div>
            <div class="flex flex-col space-y-2">
                <label class="text-sm font-light text-white" for="duraçãoAtestado"">Dias de atestado</label>
                <input class="w-96 px-0 py-0 rounded-md border border-slate-400" type="number" placeholder="Quantos dias tem o testado?"
                    name="Dias de Atestado" id="validadeAtestado" required>
            </div>
            <div class="flex flex-row flex-col space-y-6">
                <label class="text-sm font-light text-white" for="motivoFalta">Justificativa e comentários</label>
                <input class="w-500 px-0 py-0 rounded-md border border-slate-400" type="name" placeholder="Escreva a justificativa da falta ou outras informações relevantes..."
                    name="Justificativa e Observações" id="motivoFalta" required>
            </div>
            
        

            <button class="w-full px-10 py-2 bg-blue-600 text-white rounded-md
            hover:bg-blue-500 hover:drop-shadow-md duration-300 ease-in" type="submit">
                Enviar
            </button>

           
        </form>
    </div>
</body>

</html>
